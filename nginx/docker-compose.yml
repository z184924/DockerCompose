services:
  nginx:
    image: nginx:1.28.2
    container_name: nginx
    restart: always
    volumes:
      - ./conf/conf.d/:/etc/nginx/conf.d/
      - ./conf/nginx.conf:/etc/nginx/nginx.conf
      - ./conf/blackip.conf:/etc/nginx/blackip.conf
      - ./share/:/usr/share/nginx/html/
      - ./log/:/var/log/nginx/
      - ./certs/:/etc/nginx/certs/
    environment:
      - NGINX_HOST=test
      - NGINX_PORT=80
    network_mode: host